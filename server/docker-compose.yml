services:
  yesok-vietnam:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yesok-vietnam
    restart: unless-stopped
    ports:
      - "3601:3601"
    working_dir: /home/appuser
    environment:
      # ── Database ──────────────────────────────────────────────────────────────
      DB_HOST:     "72.61.213.87"
      DB_PORT:     "3610"
      DB_USER:     "root"
      DB_PASSWORD: "ijh6789$"
      DB_NAME:     "yesok_vn"
      # ── Server ────────────────────────────────────────────────────────────────
      SERVER_PORT:   "3601"
      # ── Telegram bot ──────────────────────────────────────────────────────────
      # Set TG_BOT_TOKEN to your Telegram bot token (from @BotFather).
      # The app will start even without it, but Telegram auth will be unavailable.
      TG_BOT_TOKEN:   ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3601/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
